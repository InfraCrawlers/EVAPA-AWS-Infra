---
- name: Universal Security Patching & Atomic Rollback Suite
  hosts: all
  become: yes
  vars:
    base_workdir: "/opt/vulnapps"
    backup_path: "/opt/backups/pre_patch_snapshot.tar.gz"
    
    # GENERIC APPLICATION REGISTRY
    # Add or update any application here to patch it across the fleet
    apps_to_patch:
      - { name: "tomcat", version: "9.0.86", url: "https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.86/bin/apache-tomcat-9.0.86.tar.gz", type: "archive" }
      - { name: "struts", version: "2.5.33", url: "https://archive.apache.org/dist/struts/2.5.33/struts-2.5.33-all.zip", type: "zip" }
      - { name: "elasticsearch", version: "7.17.10", url: "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-7.17.10-linux-x86_64.tar.gz", type: "archive" }
      - { name: "proftpd", version: "1.3.8", url: "https://github.com/proftpd/proftpd/archive/refs/tags/v1.3.8.tar.gz", type: "source" }

  tasks:
    # --- SECTION 1: OS LEVEL SECURITY PATCHING ---
    - name: Generic OS Patching Block
      block:
        - name: Patch Ubuntu/Debian Systems
          apt: { upgrade: dist, update_cache: yes }
          when: ansible_os_family == "Debian"

        - name: Patch RHEL/CentOS Systems
          yum: { name: '*', state: latest }
          when: ansible_os_family == "RedHat"
      rescue:
        - debug: msg: "OS Patching encountered errors. Continuing to application layer."

    # --- SECTION 2: GENERIC APP PATCHING WITH ROLLBACK ---
    - name: Application Lifecycle Management
      block:
        - name: Ensure Backup Directory exists
          file: { path: "/opt/backups", state: directory, mode: '0700' }

        - name: Backup Current Application State (Snapshot)
          archive:
            path: "{{ base_workdir }}"
            dest: "{{ backup_path }}"
          ignore_errors: yes

        - name: Stop Vulnerable Services
          shell: |
            pkill -f tomcat || true
            pkill -f elasticsearch || true
            pkill -f proftpd || true

        - name: Deploy Patched Application Versions
          include_tasks: "{{ item.type }}_patch_logic.yml" # Optional: can be inline
          loop: "{{ apps_to_patch }}"
          loop_control:
            label: "Patching {{ item.name }} to version {{ item.version }}"

        # --- SPECIAL CASE: WEB APPS (WordPress/Drupal) ---
        - name: Patch WordPress to Latest Stable
          get_url:
            url: "https://wordpress.org/latest.tar.gz"
            dest: "/tmp/wordpress.tar.gz"
        
        - name: Extract Patched WordPress
          unarchive:
            src: "/tmp/wordpress.tar.gz"
            dest: "/var/www/html/"
            remote_src: yes
            owner: www-data
            group: www-data

      rescue:
        - name: ROLLBACK - Critical Failure Detected
          debug: msg: "Application patching failed! Restoring system to pre-patch state."
        
        - name: ROLLBACK - Restore /opt/vulnapps from Backup
          unarchive:
            src: "{{ backup_path }}"
            dest: "/"
            remote_src: yes
        
        - fail: msg: "Patching process failed. Rollback successful."

    # --- SECTION 3: SERVICE RESTORATION ---
    - name: Final Service Start and Port Audit
      block:
        - name: Restart Apache and MySQL
          service:
            name: "{{ item }}"
            state: restarted
          loop: ["apache2", "mysql"]

        - name: Start Manual Services (Tomcat/ES)
          shell: |
            nohup {{ base_workdir }}/tomcat/bin/startup.sh &
            sudo -u root {{ base_workdir }}/elasticsearch/bin/elasticsearch -d
          ignore_errors: yes

      always:
        - name: Audit Open Ports
          shell: "netstat -tulpn | grep -E '21|80|8080|9200'"
          register: audit_output
        - debug: var: audit_output.stdout_lines